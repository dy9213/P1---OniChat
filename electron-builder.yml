appId: com.private.onichat
productName: OniChat

directories:
  output: dist/

mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch: arm64
  identity: null          # ad-hoc sign — no notarization, private distribution

dmg:
  title: "OniChat ${version}"
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications

files:
  - app/**
  - backend/**
  - electron/**
  - modules/**
  - scripts/**
  - package.json
  # mutable dirs — live in userData at runtime, not in bundle
  - "!**/venv/**"
  - "!**/data/**"
  # downloaded at runtime by installer
  - "!modules/tts/bin/**"
  - "!modules/llm/bin/**"
  - "!modules/stt/models/**"
  - "!modules/llm/models/**"
  # build artifacts
  - "!**/node_modules/**"
  - "!**/__pycache__/**"
  - "!**/*.pyc"
  - "!**/*.pyo"
  - "!dist/**"

asar: false   # required — Python source + shell scripts must be readable at runtime
